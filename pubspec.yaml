name: remix_workspace
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  naked_ui: ^1.0.0-beta.1
  meta: ^1.16.0

dependency_overrides:
  # mix, mix_annotations and mix_generator now resolve from pub.dev (^2.1.0).
  # mix_lint 2.0.0 (the analysis_server_plugin rebuild required for the
  # `plugins:` analyzer config) is not published yet, so it is sourced from git.
  mix_lint:
    git:
      url: https://github.com/btwld/mix.git
      ref: main
      path: packages/mix_lint

dev_dependencies:
  melos: ^7.1.1
  dart_code_metrics_presets: ^2.26.1
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1

workspace:
  - packages/demo
  - packages/example
  - packages/playground
  - packages/remix

melos:
  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.12.0 <4.0.0"
        flutter: ">=3.44.0"

  scripts:
    test:flutter:
      run: melos exec -- flutter test
      description: Run flutter test
      packageFilters:
        dirExists: test

    ci:
      run: melos run test:flutter
      description: Run flutter and dart tests
      packageFilters:
        dirExists: test
