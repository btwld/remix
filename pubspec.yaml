name: remix_workspace
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dev_dependencies:
  melos: ^7.1.1
  dart_code_metrics_presets: ^2.26.1
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1

# Remove this override after naked_ui 1.0.0-beta.3 is published.
dependency_overrides:
  naked_ui:
    git:
      url: https://github.com/btwld/naked_ui.git
      ref: 9468cec6ede3354b7a44ff71e545ad351d7158ee
      path: packages/naked_ui

workspace:
  - packages/demo
  - packages/example
  - packages/playground
  - packages/remix

melos:
  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.12.0 <4.0.0"
        flutter: ">=3.44.0"

  scripts:
    test:flutter:
      run: melos exec -- flutter test
      description: Run flutter test
      packageFilters:
        dirExists: test

    ci:
      run: melos run test:flutter
      description: Run flutter and dart tests
      packageFilters:
        dirExists: test
