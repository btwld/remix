name: remix_workspace
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dev_dependencies:
  melos: ^7.1.1
  dart_code_metrics_presets: ^2.32.0
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1

workspace:
  - packages/demo
  - packages/example
  - packages/playground
  - packages/remix

melos:
  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.12.0 <4.0.0"
        flutter: ">=3.44.0"

  scripts:
    generate:
      exec: dart run build_runner build
      description: Regenerate Remix sources
      packageFilters:
        scope: remix

    generate:check:
      steps:
        - generate
        - git diff --exit-code -- packages/remix/lib
      description: Regenerate Remix sources and fail on generated drift

    dcm:check:
      exec: dcm analyze lib --fatal-style --fatal-warnings --no-congratulate
      description: Run Dart Code Metrics with all configured severities fatal
      packageFilters:
        scope: remix

    test:flutter:
      exec: flutter test --reporter=failures-only
      description: Run flutter test
      packageFilters:
        dirExists: test

    ci:
      steps:
        - generate:check
        - dcm:check
        - test:flutter
      description: Verify generated sources and DCM, then run Flutter and Dart tests
