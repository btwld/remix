name: remix_workspace
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  # mix: ^2.0.0-rc.0
  naked_ui: ^0.2.0-beta.7
  meta: ^1.16.0

dependency_overrides:
  mix:
    git:
      url: https://github.com/btwld/mix.git
      ref: feat/styler-generator
      path: packages/mix
  mix_annotations:
    git:
      url: https://github.com/btwld/mix.git
      ref: feat/styler-generator
      path: packages/mix_annotations
  mix_generator:
    git:
      url: https://github.com/btwld/mix.git
      ref: feat/styler-generator
      path: packages/mix_generator

dev_dependencies:
  melos: ^7.1.1
  dart_code_metrics_presets: ^2.26.1
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1

workspace:
  - packages/demo
  - packages/example
  - packages/playground
  - packages/remix

melos:
  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.12.0 <4.0.0"
        flutter: ">=3.44.0"

  scripts:
    test:flutter:
      run: melos exec -- flutter test
      description: Run flutter test
      packageFilters:
        dirExists: test

    ci:
      run: melos run test:flutter
      description: Run flutter and dart tests
      packageFilters:
        dirExists: test
