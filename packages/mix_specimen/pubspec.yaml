name: mix_specimen
description: >-
  Static specimen sheets for Mix-based design systems. Renders every
  variant x state combination of a component for visual review, golden
  snapshots, and AI-agent validation.
publish_to: none
resolution: workspace

version: 0.1.0

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  mix: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
