name: demo
description: Widgetbook catalog for reviewing Remix and Fortal components.
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependency_overrides:
  accessibility_tools: ^2.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  widgetbook_annotation: ^3.11.0
  widgetbook: ^3.25.0
  remix:
    path: ../remix

dev_dependencies:
  flutter_test:
    sdk: flutter
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
