name: demo
description: Widgetbook catalog for reviewing Remix and Fortal components.
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependency_overrides:
  accessibility_tools: ^2.8.0
  mix:
    git:
      url: https://github.com/btwld/mix.git
      ref: 07dafe904e56a9b60a172f4ef1863cf45564603a
      path: packages/mix

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  widgetbook_annotation: ^3.11.0
  widgetbook: ^3.25.0
  remix:
    path: ../remix

dev_dependencies:
  flutter_test:
    sdk: flutter
  mix_atlas:
    git:
      url: https://github.com/btwld/mix.git
      ref: 07dafe904e56a9b60a172f4ef1863cf45564603a
      path: packages/mix_atlas
  mix_protocol:
    git:
      url: https://github.com/btwld/mix.git
      ref: 07dafe904e56a9b60a172f4ef1863cf45564603a
      path: packages/mix_protocol
  mix_atlas_capture:
    git:
      url: https://github.com/btwld/mix.git
      ref: 07dafe904e56a9b60a172f4ef1863cf45564603a
      path: packages/mix_atlas_capture
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
