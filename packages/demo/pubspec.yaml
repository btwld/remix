name: demo
description: Widgetbook catalog for reviewing Remix and Fortal components.
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependency_overrides:
  accessibility_tools: ^2.8.0
  # Keep Mix and Atlas on their compatible revision while the generator and
  # annotation packages use their published beta through Remix.
  mix:
    git:
      url: https://github.com/btwld/mix.git
      ref: 691eae21bc4bb806a71387186a68cb1682db5474
      path: packages/mix
  mix_protocol:
    git:
      url: https://github.com/btwld/mix.git
      ref: 691eae21bc4bb806a71387186a68cb1682db5474
      path: packages/mix_protocol

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  widgetbook_annotation: ^3.11.0
  widgetbook: ^3.25.0
  remix:
    path: ../remix

dev_dependencies:
  flutter_test:
    sdk: flutter
  mix_atlas:
    git:
      url: https://github.com/btwld/muse.git
      ref: e258ee7655f2336b3abbeb783495f44fb9cf8730
      path: packages/mix_atlas
  mix_protocol: any
  mix_atlas_capture:
    git:
      url: https://github.com/btwld/muse.git
      ref: e258ee7655f2336b3abbeb783495f44fb9cf8730
      path: packages/mix_atlas_capture
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
