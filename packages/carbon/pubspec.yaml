name: carbon
description: >-
  Carbon for Flutter — a Flutter-native implementation of the IBM Carbon Design
  System, built on the Remix, Naked UI and Mix foundations.
repository: https://github.com/btwld/remix
issue_tracker: https://github.com/btwld/remix/issues
license: Apache-2.0
resolution: workspace

# Pre-1.0: foundations + Carbon equivalents of the Remix component set.
version: 0.0.1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  mix: ^2.0.3
  naked_ui: ^0.2.0-beta.7
  remix:
    path: ../remix

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
