name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional next-version override (e.g., 1.1.0)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  release_please:
    name: Run release-please
    runs-on: ubuntu-latest
    steps:
      # Release tags stay manual so the tag-triggered pub.dev OIDC workflow runs.
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.version }}
